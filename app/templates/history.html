{% extends "base.html" %}

{% block content %}
<div class="center">
    <div class="card">

        <h2>📜 History</h2>
        <p>{{ today }}</p>

        {% for item in history %}
        <p>🔢 {{ item.guess }} → 🐂 {{ item.bulls }} | 🐄 {{ item.cows }}</p>
        {% endfor %}

        <a href="/game" class="btn small">Back</a>

    </div>
</div>
{% endblock %}
