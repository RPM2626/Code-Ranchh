{% extends "base.html" %}

{% block content %}

{% if history %}
    <table>
        <tr>
            <th>Guess</th>
            <th>Bulls</th>
            <th>Cows</th>
        </tr>

        {% for item in history %}
        <tr>
            <td>{{ item.guess }}</td>
            <td>{{ item.bulls }}</td>
            <td>{{ item.cows }}</td>
        </tr>
        {% endfor %}
    </table>
{% else %}
    <p>No guesses yet 🐄</p>
{% endif %}

<a href="/game" class="btn">Back to Game</a>
