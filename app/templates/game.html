{% extends "base.html" %}

{% block content %}
<div class="center">
    <div class="card">

        <h2>🐄 Daily Challenge</h2>
        <p>{{ today }}</p>

        <div class="timer">⏳ {{ timer }}</div>

        <form method="POST">
            <input name="guess" placeholder="Enter 4 digits">
            <button class="btn">Guess</button>
        </form>

        <h3>History</h3>

        {% for item in history %}
        <p>🔢 {{ item.guess }} → 🐂 {{ item.bulls }} | 🐄 {{ item.cows }}</p>
        {% endfor %}

        <a href="/history" class="btn small">Full History</a>

    </div>
</div>
{% endblock %}
